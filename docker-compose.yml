# Web UI:   docker compose up        ->  http://localhost:8000
#           (enter API keys / upload an IR PDF in the browser; offline sample needs none)
# CLI:      docker compose run --rm cli main.py --ticker 8035 --no-llm
#           docker compose run --rm cli -m unittest discover -s tests
services:
  web:
    build: .
    image: jp-research-agent
    command: ["-m", "src.web.app"]      # image ENTRYPOINT is `python`
    ports:
      - "8000:8000"
    volumes:
      - ./data/output:/app/data/output

  cli:
    build: .
    image: jp-research-agent
    profiles: ["cli"]                   # only runs with `docker compose run cli ...`
    volumes:
      - ./data/output:/app/data/output
